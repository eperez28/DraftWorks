services:
  - type: web
    name: draftworks-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OLLAMA_ENABLED
        value: "true"
      - key: OLLAMA_CLOUD_URL
        value: https://ollama.com/api/chat
      - key: OLLAMA_CLOUD_MODEL
        value: gemma4:31b
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "45"
